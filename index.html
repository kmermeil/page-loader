<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0B0C10;
    --bg-2: #121319;
    --panel: #15161D;
    --ink: #F2F3F5;
    --muted2: #7A7E88;
    --accent: #7C5CFF;
    --accent-2: #4CE0D2;
    --line: #24252E;
    --green: #3ED598;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{
    height:100%;
    background:
      radial-gradient(60% 50% at 15% 20%, rgba(124,92,255,0.10) 0%, transparent 60%),
      radial-gradient(50% 40% at 85% 80%, rgba(76,224,210,0.08) 0%, transparent 60%),
      var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    overflow:hidden;
  }

  body{
    display:grid;
    grid-template-columns: 220px 1fr 220px;
    align-items:center;
    min-height:100vh;
    padding: 0 32px;
    gap: 24px;
  }

  @media (max-width: 900px){
    body{ grid-template-columns: 1fr; }
    .side{ display:none; }
  }

  .side{ display:flex; flex-direction:column; gap:14px; }

  .side-card{
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 16px;
  }

  .side-card .k{
    font-family:'JetBrains Mono', monospace;
    font-size: 10.5px;
    color: var(--muted2);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .side-card .v{
    font-family:'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight:600;
    color: var(--ink);
  }

  .side-card .v.accent{ color: var(--accent-2); }
  .side.right .side-card:first-child .v{ color: var(--green); }

  .badge-row{ display:flex; flex-direction:column; gap:8px; }

  .badge{
    display:flex; align-items:center; gap:8px;
    font-size: 12.5px; color: var(--muted2); font-weight:500;
  }

  .badge svg{ width:14px; height:14px; flex-shrink:0; color: var(--green); }

  .rating-card, .shield-card{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  .stars{ display:flex; gap:3px; }
  .stars svg{ width:15px; height:15px; color: #F3C24C; }

  .center{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 24px;
  }

  .mark-wrap{ position:relative; width: 104px; height: 104px; }
  svg.mark{ width:100%; height:100%; }

  .hex-bg{ fill: var(--panel); stroke: var(--line); stroke-width: 1.5; }

  .hex-fg{
    fill:none;
    stroke: url(#gradStroke);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-dasharray: 264;
    stroke-dashoffset: 264;
    transition: stroke-dashoffset 0.15s ease-out;
  }

  /* "Preparing download" والی لائن */
  .preparing-text{
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 20px;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin-bottom: -8px;
  }

  /* پروگریس بار (بغیر ٹیکسٹ) */
  .progress-wrap{ width: 320px; display:flex; flex-direction:column; gap:10px; }

  .rail{
    width: 100%; height: 6px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow:hidden;
    position:relative;
  }

  .rail-fill{
    position:absolute; left:0; top:0; bottom:0;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-radius:6px;
    transition: width 0.15s ease-out;
  }

  .rail-fill::after{
    content:'';
    position:absolute; inset:0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    width: 40px;
    animation: shimmer 1.4s linear infinite;
  }

  @keyframes shimmer{
    0%{ transform: translateX(-40px); }
    100%{ transform: translateX(320px); }
  }

  /* نیچے ٹرسٹڈ ہیڈنگز کا نیا سیکشن */
  .trusted-headings{
    display: flex;
    gap: 30px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .trust-item{
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    color: var(--muted2);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  .trust-item svg{
    width: 18px;
    height: 18px;
    color: var(--green);
  }

  .trust-item span{
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
  }

  /* پرانی ٹرسٹ رو کو بھی رکھتے ہیں (صاف ستھرا) */
  .trust-row{
    display:flex; align-items:center; gap: 16px;
    font-family:'JetBrains Mono', monospace;
    font-size: 10.5px; color: var(--muted2); letter-spacing: 0.03em;
  }

  .trust-row span{ display:flex; align-items:center; gap:5px; }
  .trust-row svg{ width:12px; height:12px; color: var(--green); }
  .dot{ width:3px; height:3px; border-radius:50%; background: var(--line); }
</style>
</head>
<body>

  <div class="side left">
    <div class="side-card rating-card">
      <div class="stars">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.77 5.82 21 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.77 5.82 21 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.77 5.82 21 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.77 5.82 21 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.77 5.82 21 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
      </div>
      <div class="k" style="margin-top:6px;">Community rating</div>
    </div>
    <div class="side-card">
      <div class="k">Encryption</div>
      <div class="v accent">End-to-end</div>
    </div>
    <div class="side-card">
      <div class="k">Support</div>
      <div class="v">24/7 active</div>
    </div>
  </div>

  <div class="center">
    <!-- ہیکساگون نشان -->
    <div class="mark-wrap">
      <svg class="mark" viewBox="0 0 104 104">
        <defs>
          <linearGradient id="gradStroke" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7C5CFF"/>
            <stop offset="100%" stop-color="#4CE0D2"/>
          </linearGradient>
        </defs>
        <polygon class="hex-bg" points="52,6 92,28 92,76 52,98 12,76 12,28"/>
        <polygon class="hex-fg" id="ring" points="52,6 92,28 92,76 52,98 12,76 12,28"/>
        <path d="M52 34 L52 62 M42 54 L52 64 L62 54" fill="none" stroke="var(--accent-2)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M34 72 L70 72" fill="none" stroke="var(--ink)" stroke-width="4.5" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- "Preparing download" واپس آگیا -->
    <div class="preparing-text">Preparing download</div>

    <!-- پروگریس بار -->
    <div class="progress-wrap">
      <div class="rail"><div class="rail-fill" id="railFill"></div></div>
    </div>

    <!-- نئے ٹرسٹڈ ہیڈنگز -->
    <div class="trusted-headings">
      <div class="trust-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6l8-4z"/>
          <path d="M9 12l2 2 4-4"/>
        </svg>
        <span>Secure Connection</span>
      </div>
      <div class="trust-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span>Verified Publisher</span>
      </div>
      <div class="trust-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <span>No Logs</span>
      </div>
    </div>

    <!-- پرانی ٹرسٹ رو بھی رکھی گئی ہے -->
    <div class="trust-row">
      <span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        Scanned
      </span>
      <div class="dot"></div>
      <span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        Verified source
      </span>
      <div class="dot"></div>
      <span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        Open source
      </span>
    </div>
  </div>

  <div class="side right">
    <div class="side-card shield-card">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px;">
        <path d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6l8-4z"/>
        <path d="M9 12l2 2 4-4"/>
      </svg>
      <div class="k" style="margin-top:8px;">Integrity checked</div>
    </div>
    <div class="side-card badge-row">
      <div class="badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        SSL secured connection
      </div>
      <div class="badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        Checksum verified
      </div>
      <div class="badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        Privacy respected
      </div>
    </div>
  </div>

<script>
  const ring = document.getElementById('ring');
  const railFill = document.getElementById('railFill');
  const HEX_PERIMETER = 264;

  let progress = 0;

  function tick(){
    const remaining = 100 - progress;
    const step = Math.max(0.3, remaining * 0.045 + Math.random()*0.6);
    progress = Math.min(100, progress + step);

    // ہیکساگون رنگ اور پروگریس بار اپڈیٹ
    const offset = HEX_PERIMETER - (progress/100)*HEX_PERIMETER;
    ring.style.strokeDashoffset = offset;
    railFill.style.width = progress + '%';

    if(progress < 100){
      requestAnimationFrame(() => setTimeout(tick, 16));
    }
  }

  tick();
</script>

</body>
</html>
